{% extends "base.html" %}

{% block content %}
<div class="filters-section">
    <div class="filters-grid">
        <div class="filter-group">
            <label for="filter-status">Status:</label>
            <select id="filter-status" class="filter-select" onchange="aplicarFiltros()">
                <option value="">Todos</option>
                {% for status in status_choices %}
                <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <label for="filter-region">Região:</label>
            <select id="filter-region" class="filter-select" onchange="aplicarFiltros()">
                <option value="">Todas</option>
                {% for key, label in regions.items() %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <label for="filter-uf">UF:</label>
            <select id="filter-uf" class="filter-select" onchange="aplicarFiltros()">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filter-search">Buscar:</label>
            <input type="text" id="filter-search" class="filter-input"
                   placeholder="Nome, órgão, UF..." onkeyup="aplicarFiltros()">
        </div>

        <div class="filter-group checkbox">
            <label>
                <input type="checkbox" id="hide-removed" onchange="aplicarFiltros()">
                Ocultar "Tire da minha lista"
            </label>
        </div>
    </div>
</div>

<div class="stats-section" id="stats-section">
    <div class="stat-item">
        <span class="stat-label">Total:</span>
        <span class="stat-value" id="stat-total">0</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Não classificados:</span>
        <span class="stat-value" id="stat-unclassified">0</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Vou ver de novo:</span>
        <span class="stat-value highlight" id="stat-review">0</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Removidos:</span>
        <span class="stat-value" id="stat-removed">0</span>
    </div>
</div>

<div id="concursos-container" class="concursos-container">
    <div class="loading">Carregando concursos...</div>
</div>

<template id="concurso-template">
    <div class="concurso-card" data-id="">
        <div class="concurso-header">
            <div class="concurso-title">
                <h3></h3>
                <p class="concurso-orgao"></p>
            </div>
            <div class="concurso-meta">
                <span class="badge-region"></span>
                <span class="badge-uf"></span>
            </div>
        </div>

        <div class="concurso-body">
            <div class="info-row">
                <strong>Cargos:</strong>
                <span class="cargos">-</span>
            </div>
            <div class="info-row">
                <strong>Escolaridade:</strong>
                <span class="escolaridade">-</span>
            </div>
            <div class="info-row">
                <strong>Vagas:</strong>
                <span class="vagas">-</span>
            </div>
            <div class="info-row">
                <strong>Prazo:</strong>
                <span class="prazo">-</span>
            </div>
            <div class="info-row">
                <strong>Encontrado em:</strong>
                <span class="data-encontrado">-</span>
            </div>
        </div>

        <div class="concurso-notes">
            <div class="notes-content"></div>
            <button class="btn-edit-notes" onclick="editarNotas(this)">✏️ Notas</button>
        </div>

        <div class="concurso-footer">
            <div class="status-buttons">
                <button class="status-btn status-1" onclick="mudarStatus(this, 'Ainda não classificados')">
                    Não classificado
                </button>
                <button class="status-btn status-2" onclick="mudarStatus(this, 'Vou ver de novo')">
                    Vou ver de novo
                </button>
                <button class="status-btn status-3" onclick="mudarStatus(this, 'Tire da minha lista')">
                    Remover
                </button>
            </div>
            <div class="concurso-actions">
                <a class="btn-link" target="_blank" title="Abrir no PCI">
                    🔗 PCI
                </a>
            </div>
        </div>
    </div>
</template>

<div id="modal-notas" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Editar Notas</h2>
            <button class="modal-close" onclick="fecharModalNotas()">&times;</button>
        </div>
        <div class="modal-body">
            <textarea id="notas-input" class="notas-textarea" placeholder="Suas observações sobre este concurso..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="salvarNotas()">Salvar</button>
            <button class="btn-secondary" onclick="fecharModalNotas()">Cancelar</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

{% endblock %}

{% block scripts %}
<script>
    const REGIONS = {{ regions | tojson }};
    const STATUS_CHOICES = {{ status_choices | tojson }};
    let todosOsConcursos = [];
    let concursoEditando = null;

    document.addEventListener('DOMContentLoaded', () => {
        carregarConcursos();
        carregarStats();
        popularSelectUF();
        setInterval(carregarStats, 30000);
    });

    function carregarConcursos() {
        const filters = getParams();
        const queryString = new URLSearchParams(filters).toString();

        fetch(`/api/concursos?${queryString}`)
            .then(r => r.json())
            .then(data => {
                todosOsConcursos = data;
                renderizarConcursos(data);
                atualizarDataAtualizacao();
            })
            .catch(e => {
                console.error('Erro ao carregar concursos:', e);
                mostrarToast('Erro ao carregar concursos', 'error');
            });
    }

    function getParams() {
        return {
            status: document.getElementById('filter-status').value,
            region: document.getElementById('filter-region').value,
            uf: document.getElementById('filter-uf').value,
            search: document.getElementById('filter-search').value,
            hide_removed: document.getElementById('hide-removed').checked
        };
    }

    function renderizarConcursos(concursos) {
        const container = document.getElementById('concursos-container');
        const template = document.getElementById('concurso-template');

        if (concursos.length === 0) {
            container.innerHTML = '<div class="no-results">Nenhum concurso encontrado</div>';
            return;
        }

        container.innerHTML = '';
        concursos.forEach(c => {
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.concurso-card');

            card.dataset.id = c.id;
            card.dataset.status = c.status;
            card.classList.add(`status-${getStatusClass(c.status)}`);

            clone.querySelector('h3').textContent = c.titulo;
            clone.querySelector('.concurso-orgao').textContent = c.orgao || '-';
            clone.querySelector('.badge-region').textContent = REGIONS[c.regiao] || c.regiao;
            clone.querySelector('.badge-uf').textContent = c.uf || '-';
            clone.querySelector('.cargos').textContent = c.cargos || '-';
            clone.querySelector('.escolaridade').textContent = c.escolaridade || '-';
            clone.querySelector('.vagas').textContent = c.vagas || '-';
            clone.querySelector('.prazo').textContent = c.prazo || '-';
            clone.querySelector('.data-encontrado').textContent = formatarData(c.data_encontrado);

            const notesContent = clone.querySelector('.notes-content');
            if (c.notas) {
                notesContent.textContent = c.notas;
            } else {
                notesContent.textContent = '';
            }

            const linkElem = clone.querySelector('.btn-link');
            if (c.link) {
                linkElem.href = c.link;
            } else {
                linkElem.style.opacity = '0.3';
                linkElem.onclick = (e) => e.preventDefault();
            }

            const statusBtns = clone.querySelectorAll('.status-btn');
            statusBtns.forEach(btn => {
                if (btn.textContent.includes(getStatusLabel(c.status))) {
                    btn.classList.add('active');
                }
            });

            container.appendChild(clone);
        });
    }

    function getStatusClass(status) {
        if (status === 'Vou ver de novo') return '2';
        if (status === 'Tire da minha lista') return '3';
        return '1';
    }

    function getStatusLabel(status) {
        if (status === 'Ainda não classificados') return 'Não classificado';
        if (status === 'Vou ver de novo') return 'Vou ver de novo';
        return 'Remover';
    }

    function mudarStatus(btn, novoStatus) {
        const card = btn.closest('.concurso-card');
        const concursoId = parseInt(card.dataset.id);

        fetch(`/api/concursos/${concursoId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: novoStatus })
        })
        .then(r => r.json())
        .then(data => {
            card.dataset.status = novoStatus;
            card.className = `concurso-card status-${getStatusClass(novoStatus)}`;

            const statusBtns = card.querySelectorAll('.status-btn');
            statusBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            mostrarToast('Status atualizado!', 'success');
            carregarStats();
        })
        .catch(e => mostrarToast('Erro ao atualizar status', 'error'));
    }

    function editarNotas(btn) {
        const card = btn.closest('.concurso-card');
        concursoEditando = card.dataset.id;
        const notasContent = card.querySelector('.notes-content').textContent;
        document.getElementById('notas-input').value = notasContent;
        document.getElementById('modal-notas').style.display = 'flex';
        document.getElementById('notas-input').focus();
    }

    function salvarNotas() {
        const novas = document.getElementById('notas-input').value;
        const concursoId = parseInt(concursoEditando);

        fetch(`/api/concursos/${concursoId}/notas`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notas: novas })
        })
        .then(r => r.json())
        .then(data => {
            const card = document.querySelector(`[data-id="${concursoId}"]`);
            card.querySelector('.notes-content').textContent = novas;
            fecharModalNotas();
            mostrarToast('Notas salvas!', 'success');
        })
        .catch(e => mostrarToast('Erro ao salvar notas', 'error'));
    }

    function fecharModalNotas() {
        document.getElementById('modal-notas').style.display = 'none';
        concursoEditando = null;
    }

    function scrapeNow() {
        const btn = document.getElementById('btn-scrape');
        btn.disabled = true;
        btn.textContent = '⏳ Atualizando...';

        fetch('/api/scrape', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                mostrarToast(`✅ Atualização concluída! ${data.novos} novos, ${data.atualizados} atualizados`, 'success');
                carregarConcursos();
                carregarStats();
            })
            .catch(e => {
                mostrarToast('Erro ao atualizar', 'error');
                console.error(e);
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '🔄 Atualizar do PCI';
            });
    }

    function carregarStats() {
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-unclassified').textContent = data.por_status['Ainda não classificados'] || 0;
                document.getElementById('stat-review').textContent = data.por_status['Vou ver de novo'] || 0;
                document.getElementById('stat-removed').textContent = data.por_status['Tire da minha lista'] || 0;
                document.getElementById('total-concursos').textContent = data.total;
            });
    }

    function aplicarFiltros() {
        carregarConcursos();
    }

    function popularSelectUF() {
        fetch('/api/ufs')
            .then(r => r.json())
            .then(ufs => {
                const select = document.getElementById('filter-uf');
                // remove opções antigas (exceto a primeira "Todos")
                while (select.options.length > 1) select.remove(1);
                ufs.forEach(uf => {
                    const o = document.createElement('option');
                    o.value = uf; o.textContent = uf;
                    select.appendChild(o);
                });
            });
    }

    function formatarData(dataStr) {
        if (!dataStr) return '-';
        const data = new Date(dataStr);
        return data.toLocaleDateString('pt-BR', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function atualizarDataAtualizacao() {
        const agora = new Date();
        const texto = `Última atualização: ${agora.toLocaleTimeString('pt-BR')}`;
        document.getElementById('last-update').textContent = texto;
    }

    function mostrarToast(mensagem, tipo = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = mensagem;
        toast.className = `toast ${tipo} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.getElementById('modal-notas').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-notas')) {
            fecharModalNotas();
        }
    });
</script>
{% endblock %}
